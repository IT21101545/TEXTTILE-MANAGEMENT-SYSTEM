# Profile: sqlserver
# Run the app with: spring.profiles.active=sqlserver
# Or: mvnw spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=sqlserver

# --- Connection (pick ONE style) ---

# A) Windows Authentication (recommended on your PC — uses your Windows login)
#    Requires sqljdbc_auth.dll (x64) on PATH or next to java.exe — see Microsoft JDBC docs.
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TextileManagementSystem;integratedSecurity=true;encrypt=false;trustServerCertificate=true
# Do not set username/password for integrated security.

# B) SQL Server login (sa or a SQL user) — comment out block A and uncomment below:
#spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=TextileManagementSystem;encrypt=false;trustServerCertificate=true
#spring.datasource.username=sa
#spring.datasource.password=YOUR_PASSWORD_HERE

# --- Pool (optional) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
