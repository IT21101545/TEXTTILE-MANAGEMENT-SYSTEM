<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Textile Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: url('images/bg.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      position: relative;
      z-index: 1;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.5); /* subtle dark overlay */
      z-index: -1;
    }
    .auth-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      overflow: visible;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      position: relative;
    }
    .auth-header {
      background: #2c3e50;
      color: white;
      padding: 40px 30px;
      text-align: center;
      border-radius: 20px 20px 0 0;
      position: relative;
    }
    .auth-header::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 15px 15px 0;
      border-style: solid;
      border-color: #2c3e50 transparent transparent transparent;
      z-index: 10;
    }
    .auth-header h3 {
      font-weight: 700;
      margin-bottom: 5px;
      font-size: 24px;
      letter-spacing: -0.5px;
    }
    .auth-header p {
      color: #cbd5e1;
      margin-bottom: 0;
      font-size: 14px;
    }
    .auth-body {
      padding: 45px 40px 35px;
    }
    .form-control {
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background-color: #f8fafc;
      font-size: 14px;
    }
    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: none;
      background-color: #fff;
    }
    .form-control::placeholder {
      color: #94a3b8;
    }
    .input-group-text {
      border-radius: 8px 0 0 8px;
      border: 1px solid #e2e8f0;
      background-color: #f8fafc;
    }
    .form-control.border-start-0 {
      border-left: none;
      border-radius: 0 8px 8px 0;
    }
    .input-group-text + .form-control:focus {
      border-left: none;
    }
    .form-label {
      font-weight: 600;
      color: #475569;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .btn-primary {
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      background: #3b82f6;
      border: none;
      width: 100%;
      transition: all 0.3s ease;
      margin-top: 10px;
      font-size: 15px;
    }
    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }
    .auth-footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #64748b;
    }
    .auth-footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .auth-footer a:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }
    .alert {
      border-radius: 8px;
      font-size: 13px;
      border: none;
      margin-bottom: 20px;
    }
    .forgot-link {
      font-size: 12px;
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .forgot-link:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <div style="background: rgba(255,255,255,0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
        <i class="fa-solid fa-gem fa-2x"></i>
      </div>
      <h3>Welcome Back</h3>
      <p>Sign in to continue to Textile Management</p>
    </div>
    <div class="auth-body">
      <div id="errorMsg" class="alert alert-danger d-none shadow-sm pb-2 pt-2"><i class="fa-solid fa-circle-exclamation me-2"></i><span id="errorText"></span></div>
      
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-envelope text-secondary"></i></span>
            <input type="email" id="email" class="form-control border-start-0" placeholder="jane@example.com" required>
          </div>
        </div>
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0">Password</label>
            <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock text-secondary"></i></span>
            <input type="password" id="password" class="form-control border-start-0" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary shadow-sm"><i class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
      </form>
      
      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');

      try {
        const response = await fetch('http://localhost:8080/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (!response.ok) {
          let errMsg = data.error || 'Login failed';
          if (data.errors) {
            errMsg = Object.values(data.errors).join(', ');
          }
          throw new Error(errMsg);
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Redirect based on role
        const role = data.user.roleName;
        if (role === 'Admin' || role === 'Owner') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'profile.html';
        }
      } catch (error) {
        errorText.textContent = error.message;
        errorDiv.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
