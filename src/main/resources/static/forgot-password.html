<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Textile Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">Forgot Password</div>
                    <div class="card-body">
                        <div id="msg" class="alert d-none"></div>
                        <form id="forgotForm">
                            <div class="mb-3">
                                <label>Enter your registered Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                        </form>
                        <div class="mt-3 text-center">
                            <a href="login.html">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('msg');
            msgDiv.classList.add('d-none');
            msgDiv.classList.remove('alert-success', 'alert-danger');

            try {
                const response = await fetch('http://localhost:8080/api/users/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Failed to send reset link');

                msgDiv.textContent = data.message + ' (Check backend terminal for local token)';
                msgDiv.classList.add('alert-success');
                msgDiv.classList.remove('d-none');

                // For local testing convenience without actual email server:
                setTimeout(() => {
                    window.location.href = 'reset-password.html';
                }, 3000);

            } catch (error) {
                msgDiv.textContent = error.message;
                msgDiv.classList.add('alert-danger');
                msgDiv.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
