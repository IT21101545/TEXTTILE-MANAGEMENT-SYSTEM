<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Textile Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">Reset Password</div>
                    <div class="card-body">
                        <div id="msg" class="alert d-none"></div>
                        <form id="resetForm">
                            <div class="mb-3">
                                <label>Reset Token (Found in terminal logs for testing)</label>
                                <input type="text" id="token" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>New Password</label>
                                <input type="password" id="newPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Reset Password</button>
                        </form>
                        <div class="mt-3 text-center">
                            <a href="login.html">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Pre-fill token if URL has ?token=...
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
            document.getElementById('token').value = urlToken;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const msgDiv = document.getElementById('msg');
            msgDiv.classList.add('d-none');
            msgDiv.classList.remove('alert-success', 'alert-danger');

            try {
                const response = await fetch(`http://localhost:8080/api/users/reset-password/${token}?newPassword=${encodeURIComponent(newPassword)}`, {
                    method: 'POST'
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Failed to reset password');

                msgDiv.textContent = 'Password reset successfully! Redirecting to login...';
                msgDiv.classList.add('alert-success');
                msgDiv.classList.remove('d-none');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                msgDiv.textContent = error.message;
                msgDiv.classList.add('alert-danger');
                msgDiv.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
