<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Textile Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .modal-background {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1040;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Textile Management</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h2>User Management</h2>
    <div id="errorMsg" class="alert alert-danger d-none"></div>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody"></tbody>
    </table>
  </div>

  <!-- Edit User Bootstrap Modal (Custom toggle logic so we don't rely on full bootstrap.js imports) -->
  <div class="modal-background" id="modalBackdrop"></div>
  <div class="modal fade" id="editUserModal" tabindex="-1" style="display: none;">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit User Info & Role</h5>
          <button type="button" class="btn-close" onclick="closeEditModal()"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="editEmail" class="form-control" autocomplete="off">
          </div>
          <div class="mb-3">
            <label class="form-label">Assigned Role</label>
            <select id="editRole" class="form-select">
              <option value="1">Admin</option>
              <option value="2">Owner</option>
              <option value="3">SalesManager</option>
              <option value="4">Staff</option>
              <option value="5">Customer</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button type="button" class="btn btn-primary" id="saveUserBtn">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = 'login.html';
    }
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));
    if (user.roleName !== 'Admin' && user.roleName !== 'Owner') {
      window.location.href = 'profile.html';
    }

    async function loadUsers() {
      try {
        const response = await fetch('http://localhost:8080/api/users', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const users = await response.json();
        if (!response.ok) throw new Error(users.error || 'Failed to load users');
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        users.forEach(u => {
          const row = tbody.insertRow();
          row.insertCell(0).innerText = u.userId;
          row.insertCell(1).innerText = u.fullName;
          row.insertCell(2).innerText = u.email;
          row.insertCell(3).innerText = u.roleName;
          row.insertCell(4).innerText = u.isActive ? 'Active' : 'Inactive';
          const actions = row.insertCell(5);

          // Edit Button for Role/Email
          const editBtn = document.createElement('button');
          editBtn.className = 'btn btn-sm btn-primary me-2';
          editBtn.innerText = 'Edit';
          
          let roleIdToLink = 5;
          if (u.roleName === 'Admin') roleIdToLink = 1;
          if (u.roleName === 'Owner') roleIdToLink = 2;
          if (u.roleName === 'SalesManager') roleIdToLink = 3;
          if (u.roleName === 'Staff') roleIdToLink = 4;
          
          editBtn.onclick = () => openEditModal(u.userId, u.email, roleIdToLink);

          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'btn btn-sm btn-warning me-2';
          toggleBtn.innerText = u.isActive ? 'Deactivate' : 'Activate';
          toggleBtn.onclick = () => toggleUserStatus(u.userId, u.isActive);

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn btn-sm btn-danger';
          deleteBtn.innerText = 'Delete';
          deleteBtn.onclick = () => deleteUser(u.userId);

          actions.appendChild(editBtn);
          actions.appendChild(toggleBtn);
          actions.appendChild(deleteBtn);
        });
      } catch (error) {
        document.getElementById('errorMsg').textContent = error.message;
        document.getElementById('errorMsg').classList.remove('d-none');
      }
    }

    async function toggleUserStatus(userId, isActive) {
      const url = isActive ? `/api/users/${userId}/deactivate` : `/api/users/${userId}/activate`;
      try {
        const response = await fetch(`http://localhost:8080${url}`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('Failed to update status');
        loadUsers();
      } catch (error) {
        alert(error.message);
      }
    }

    async function deleteUser(userId) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      try {
        const response = await fetch(`http://localhost:8080/api/users/${userId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('Failed to delete user');
        loadUsers();
      } catch (error) {
        alert(error.message);
      }
    }

    // Modal Logic for editing User
    let currentEditUserId = null;
    const modalEl = document.getElementById('editUserModal');
    const backdropEl = document.getElementById('modalBackdrop');
    
    function openEditModal(userId, email, roleIdValue) {
      currentEditUserId = userId;
      document.getElementById('editEmail').value = email;
      document.getElementById('editRole').value = roleIdValue;
      modalEl.style.display = 'block';
      modalEl.classList.add('show');
      backdropEl.style.display = 'block';
    }
    
    function closeEditModal() {
      modalEl.style.display = 'none';
      modalEl.classList.remove('show');
      backdropEl.style.display = 'none';
      currentEditUserId = null;
    }

    document.getElementById('saveUserBtn').addEventListener('click', async () => {
      const email = document.getElementById('editEmail').value;
      const roleId = document.getElementById('editRole').value;
      try {
        const response = await fetch(`http://localhost:8080/api/users/${currentEditUserId}`, {
          method: 'PUT',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: email, roleId: parseInt(roleId) })
        });
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Failed to update user');
        }
        closeEditModal();
        loadUsers();
      } catch (error) {
        alert(error.message);
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await fetch('http://localhost:8080/api/auth/logout', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      } catch (e) { }
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    });

    loadUsers();
  </script>
</body>

</html>
